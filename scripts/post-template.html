<script>
// ===== FLUID BLOB BG =====
const blobEls = [document.getElementById('b0'),document.getElementById('b1'),document.getElementById('b2'),document.getElementById('b3')];
const palette=[[30,0,50],[100,0,180],[150,0,255],[199,125,255],[100,0,180],[20,0,40]],palPos=[0,.2,.4,.6,.8,1];
function lerpC(t){t=((t%1)+1)%1;for(let i=0;i<palPos.length-1;i++){if(t>=palPos[i]&&t<=palPos[i+1]){const f=(t-palPos[i])/(palPos[i+1]-palPos[i]);return[Math.round(palette[i][0]+(palette[i+1][0]-palette[i][0])*f),Math.round(palette[i][1]+(palette[i+1][1]-palette[i][1])*f),Math.round(palette[i][2]+(palette[i+1][2]-palette[i][2])*f)]}}return palette[palette.length-1]}
const blobData=[
  {phase:0,ox:.35,oy:.18,op:.7,os:.6},
  {phase:.25,ox:.65,oy:.5,op:.3,os:.5},
  {phase:.5,ox:.2,oy:.75,op:.5,os:.45},
  {phase:.75,ox:.55,oy:.82,op:.4,os:.55},
];
function updateFluid(){
  const vh=window.innerHeight,vw=window.innerWidth;
  const docH=Math.max(1,document.documentElement.scrollHeight-vh);
  const progress=Math.min(1,Math.max(0,window.scrollY/docH));
  const idle=Date.now()/6000;
  blobData.forEach((bd,i)=>{
    const e=blobEls[i];if(!e)return;
    const p=((progress+bd.phase+idle*.08)%1+1)%1;
    const a=p*Math.PI*2+i*1.3,a2=p*Math.PI*1.7+i*.9;
    let x,y,sx,sy;
    switch(i){
      case 0:x=bd.ox+.55*(.5+.5*Math.sin(a));y=bd.oy+.35*(.5+.5*Math.sin(a2));sx=bd.os+.15*Math.sin(a*.7);sy=bd.os*.8+.1*Math.cos(a*.5);break;
      case 1:x=bd.ox+.25*(.5+.5*Math.cos(a*.8));y=bd.oy+.35*(.5+.5*Math.sin(a2*.9));sx=bd.os+.2*Math.cos(a*.6);sy=bd.os*.75+.15*Math.sin(a*.4);break;
      case 2:x=bd.ox+.6*(.5+.5*Math.cos(a*.6));y=bd.oy+.2*(.5+.5*Math.sin(a*.7));sx=bd.os+.2*Math.sin(a*.5);sy=bd.os+.15*Math.cos(a*.3);break;
      default:x=bd.ox+.45*(.5+.5*Math.sin(a*.9));y=bd.oy+.25*(.5+.5*Math.cos(a2*.8));sx=bd.os+.15*Math.cos(a*.4);sy=bd.os*.7+.15*Math.sin(a*.6);break;
    }
    const c=lerpC(p+.12*Math.sin(idle+i));
    e.style.left=(x*100)+'%';e.style.top=(y*100)+'%';
    e.style.width=(sx*100)+'vw';e.style.height=(sy*100)+'vh';
    e.style.transform='translate(-50%,-50%)';
    e.style.background=`radial-gradient(ellipse at 50% 50%, rgba(${c[0]},${c[1]},${c[2]},.28) 0%, rgba(${c[0]},${c[1]},${c[2]},.12) 40%, transparent 65%)`;
  });
}
function rafFluid(){updateFluid();requestAnimationFrame(rafFluid)}
rafFluid();

// ===== NAV HIDE/SHOW =====
let ls=0;
const n=document.querySelector('.site-header');
window.addEventListener('scroll',()=>{
  const cw=window.scrollY;
  n.classList.toggle('hidden',cw>ls&&cw>80);
  ls=cw;
},{passive:true});
</script>
